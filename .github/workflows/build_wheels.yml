name: Build Mobile-GS Wheels

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to upload wheels to when run manually (e.g. v0.1.0)'
        required: false
        type: string
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build_wheels:
    name: Build (${{ matrix.os }}, Py ${{ matrix.python }}, PT ${{ matrix.pytorch }}, CUDA ${{ matrix.cuda }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
        python: ['3.10', '3.11', '3.12', '3.13']
        pytorch: ['2.5.0', '2.6.0', '2.7.0', '2.8.0', '2.9.0', '2.10.0']
        cuda: ['12.4', '12.6', '12.8', '13.0']
        exclude:
          # CUDA 12.6: torch 2.5.x wheels are not published for cu126
          - pytorch: '2.5.0'
            cuda: '12.6'
          # CUDA 12.8: torch < 2.7 wheels are not published for cu128
          - pytorch: '2.5.0'
            cuda: '12.8'
          - pytorch: '2.6.0'
            cuda: '12.8'
          # CUDA 12.4: torch >= 2.7 wheels are not published for cu124
          - pytorch: '2.7.0'
            cuda: '12.4'
          - pytorch: '2.8.0'
            cuda: '12.4'
          - pytorch: '2.10.0'
            cuda: '12.4'
          # CUDA 13.0: torch < 2.9 wheels are not published for cu130
          - pytorch: '2.5.0'
            cuda: '13.0'
          - pytorch: '2.6.0'
            cuda: '13.0'
          - pytorch: '2.7.0'
            cuda: '13.0'
          - pytorch: '2.8.0'
            cuda: '13.0'

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      
      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: '${{ matrix.cuda }}.0'
          log-file-suffix: 'py${{ matrix.python }}-pt${{ matrix.pytorch }}-cu${{ matrix.cuda }}.txt'

      - name: Install Standard Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel setuptools

      - name: Install PyTorch
        run: |
          # Format CUDA version for PyTorch URL (e.g., 12.6 -> cu126)
          CUDA_WHL="cu${{ matrix.cuda }}"
          CUDA_WHL="${CUDA_WHL//./}"
          
          # Forces pip to install the exact PyTorch version from the matrix
          pip install torch==${{ matrix.pytorch }} torchvision --index-url https://download.pytorch.org/whl/$CUDA_WHL

      - name: Dynamically Set Target Architectures
        run: |
          if [[ "${{ matrix.cuda }}" == "12.4" ]] || [[ "${{ matrix.cuda }}" == "12.6" ]]; then
            echo "ARCH_LIST=7.0;7.2;7.5;8.0;8.6;8.7;8.9;9.0+PTX" >> $GITHUB_ENV
          elif [[ "${{ matrix.cuda }}" == "13.0" ]]; then
            # CUDA 13 no longer supports compute_70/compute_72.
            echo "ARCH_LIST=7.5;8.0;8.6;8.7;8.9;9.0;10.0;12.0+PTX" >> $GITHUB_ENV
          else
            # 10.0 and 12.0 added for Blackwell on CUDA 12.8+
            echo "ARCH_LIST=7.0;7.2;7.5;8.0;8.6;8.7;8.9;9.0;10.0;12.0+PTX" >> $GITHUB_ENV
          fi

      - name: Build Wheels for Submodules
        env:
          TORCH_CUDA_ARCH_LIST: ${{ env.ARCH_LIST }}
          PT_VERSION: ${{ matrix.pytorch }}
          CUDA_VERSION: ${{ matrix.cuda }}
        run: |
          # Capture the repo root so all absolute paths are consistent regardless
          # of which directory is current at any point during the loop.
          REPO_ROOT="$(pwd)"
          mkdir -p "${REPO_ROOT}/dist_all"

          SUBMODULES=(
            "submodules/diff-gaussian-rasterization"
            "submodules/diff-gaussian-rasterization_ms"
            "submodules/diff-gaussian-rasterization_msori"
            "submodules/simple-knn"
          )

          FAILED_SUBMODS=()

          for SUBMOD in "${SUBMODULES[@]}"; do
            echo "--- Building ${SUBMOD} ---"

            # Guard: verify the submodule directory was checked out.
            if [[ ! -d "${REPO_ROOT}/${SUBMOD}" ]]; then
              echo "::error::Submodule directory not found: ${REPO_ROOT}/${SUBMOD}"
              FAILED_SUBMODS+=("${SUBMOD}")
              continue
            fi

            # Always start each iteration with a clean dist_temp so stale files
            # from a previous build (successful or failed) can never bleed through.
            rm -rf "${REPO_ROOT}/dist_temp"
            mkdir -p "${REPO_ROOT}/dist_temp"

            # Build inside a subshell so that directory-state (cd) is fully
            # isolated from the outer loop — no pushd/popd fragility.
            BUILD_OK=0
            (
              cd "${REPO_ROOT}/${SUBMOD}"
              if [[ "${{ runner.os }}" == "Windows" ]]; then
                python "${REPO_ROOT}/.github/scripts/patch_windows_setup.py"
              fi
              python -m build --wheel --no-isolation --outdir "${REPO_ROOT}/dist_temp"
            ) && BUILD_OK=1

            if [[ "${BUILD_OK}" -eq 1 ]]; then
              # Rename and move wheels into dist_all; also cleans dist_temp.
              # rename_wheels.py is run from REPO_ROOT so relative paths resolve correctly.
              if ! python "${REPO_ROOT}/.github/scripts/rename_wheels.py"; then
                echo "::error::rename_wheels.py failed for ${SUBMOD}"
                FAILED_SUBMODS+=("${SUBMOD}")
              fi
            else
              echo "::error::Build failed for ${SUBMOD}"
              FAILED_SUBMODS+=("${SUBMOD}")
            fi
          done

          if [[ "${#FAILED_SUBMODS[@]}" -gt 0 ]]; then
            echo "::error::The following submodule(s) failed to build: ${FAILED_SUBMODS[*]}"
            echo "::error::Any successfully built wheels have been preserved in dist_all/."
            exit 1
          fi

      - name: Upload Wheels as Artifact
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-GS-${{ matrix.os }}-py${{ matrix.python }}-pt${{ matrix.pytorch }}-cu${{ matrix.cuda }}
          path: dist_all/*.whl
          if-no-files-found: warn

      - name: Upload Wheels to Release page
        if: (success() || failure()) && (github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.release_tag != ''))
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}
          files: dist_all/*.whl
          fail_on_unmatched_files: false
